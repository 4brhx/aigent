<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#0f0f17"/>
  <meta name="author" content="IB"/>
  <title>AIgent · by IB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./css/variables.css"/>
  <link rel="stylesheet" href="./css/layout.css"/>
  <link rel="stylesheet" href="./css/components.css"/>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" data-open="false">
    <div class="sidebar-head">
      <div class="brand">
        <span class="brand-icon"><svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 7v10M7.5 9.5l9 5M16.5 9.5l-9 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".7"/></svg></span>
        <span class="brand-name">AIgent</span>
        <span class="brand-tag">IB</span>
      </div>
      <button class="btn-icon" data-action="close-sidebar" aria-label="إغلاق"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>

    <button class="btn-new" data-action="new-chat"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>محادثة جديدة</button>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input id="searchInput" type="search" placeholder="بحث…" autocomplete="off"/>
    </div>

    <nav id="convList" class="conv-list"></nav>

    <div class="sidebar-models">
      <div class="section-label">النموذج</div>
      <div id="modelGrid" class="model-grid"></div>
    </div>

    <div class="ib-card"><span class="ib-badge">IB</span><span><b>تطوير: IB</b> — صاحب الإيجنت</span></div>

    <div class="sidebar-foot">
      <div class="user-avatar">U</div>
      <div class="user-info"><div class="user-name">المستخدم</div><div class="user-plan">خطة مجانية</div></div>
      <button class="btn-icon" data-action="toggle-theme" aria-label="تبديل"><svg class="ico-sun" viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg><svg class="ico-moon" viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M21 13.5A9 9 0 1 1 10.5 3a7 7 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-start">
        <button class="btn-icon mobile-only" data-action="open-sidebar" aria-label="القائمة"><svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
        <button id="modelPill" class="pill" aria-haspopup="listbox">
          <span id="pillIcon" class="pill-icon"></span>
          <span class="pill-text"><small>النموذج</small><strong id="pillName">—</strong></span>
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <h1 id="chatTitle" class="topbar-title">محادثة جديدة</h1>
      </div>
      <div class="topbar-end">
        <button class="btn-icon" data-action="rename-chat" aria-label="تعديل"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M4 20h4l10-10-4-4L4 16v4ZM14 6l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="btn-icon" data-action="delete-chat" aria-label="حذف"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-9 0 1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </header>

    <div id="modelMenu" class="dropdown hidden" role="listbox"></div>

    <section id="chatArea" class="chat-area">
      <div id="emptyState" class="empty">
        <span class="empty-badge"><span class="pulse-dot"></span>4 نماذج · واجهة واحدة · من IB</span>
        <h2 class="empty-title">مرحباً، أنا <span class="gradient-text">AIgent</span></h2>
        <p class="empty-sub">واجهة موحّدة للتحدث مع <b>Gemini</b> و <b>Claude</b> و <b>ChatGPT</b> و <b>DeepSeek</b>.</p>
        <div id="suggestions" class="suggestions"></div>
      </div>
      <ol id="messages" class="msg-list"></ol>
    </section>

    <footer class="composer-area">
      <button id="scrollBtn" class="scroll-btn hidden" data-action="scroll-down" aria-label="للأسفل"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <form id="composerForm" class="composer" autocomplete="off">
        <div class="composer-row">
          <button type="button" class="btn-icon" data-action="attach" aria-label="إرفاق"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="m21 12-8.5 8.5a5 5 0 0 1-7-7L14 5a3.5 3.5 0 1 1 5 5l-8.5 8.5a2 2 0 1 1-2.8-2.8L15 8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <textarea id="input" class="composer-input" rows="1" placeholder="اكتب رسالتك…" aria-label="رسالة"></textarea>
          <button type="submit" id="sendBtn" class="btn-send" disabled aria-label="إرسال">
            <svg class="ico-send" viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M4 12 20 4l-8 16-2-7-6-1Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            <svg class="ico-stop hidden" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div class="composer-footer">
          <div class="chips">
            <button type="button" class="chip" data-tool="web"><svg viewBox="0 0 24 24" fill="none" width="12" height="12"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" stroke="currentColor" stroke-width="1.5"/></svg>ويب</button>
            <button type="button" class="chip" data-tool="code"><svg viewBox="0 0 24 24" fill="none" width="12" height="12"><path d="m8 8-4 4 4 4M16 8l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>كود</button>
          </div>
          <span class="composer-meta"><span id="charCount">0</span> · <kbd>Enter</kbd></span>
        </div>
      </form>
      <p class="footnote">واجهة عرض — الإجابات محاكاة محلياً · <span class="ib-inline">IB</span></p>
    </footer>
  </main>
</div>

<div id="overlay" class="overlay hidden"></div>
<div id="toast" class="toast"><span class="toast-dot"></span><span class="toast-msg"></span></div>

<script src="./js/state.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
